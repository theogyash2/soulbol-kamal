service: soulbol-server #Unique name for all containers and services                
image: soulbol-server-kamal #repo name

builder:
  arch: amd64

servers:
 web:
  hosts:
    - 13.207.60.18
  env:
    APP_ROLE: web
  proxy:
      path_prefix: /
 
 Worker:
  hosts:
    - 13.207.60.18

  env:
    APP_ROLE: worker
  cmd: /app/my-go-app
  proxy: false

ssh:
 user: root
 keys:
      - ~/.ssh/kamal-test-new.pem

proxy:
  # ssl: true
  host: 13.207.60.18
  app_port: 3000       
  healthcheck:             
    path: /up            
    interval:  1           
    timeout: 3  


registry:
 server: 495599768662.dkr.ecr.ap-south-1.amazonaws.com
 username: AWS
 password:  
  - KAMAL_REGISTRY_PASSWORD